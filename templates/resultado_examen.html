{% extends 'header.html' %}
{% block content %}
<div class="container mt-5">
  <h2 class="mb-3">{{ curso.titulo }} — Resultado</h2>

  <div class="card">
    <div class="card-body">
      <p class="lead">Tu calificación: <strong>{{ intento.calificacion }}</strong> / 10</p>
      {% if intento.aprobado %}
        <div class="alert alert-success mb-0">¡Aprobaste! 🎉</div>
      {% else %}
        <div class="alert alert-warning mb-0">No alcanzaste 8.0. ¡Ánimo!</div>
      {% endif %}
    </div>
  </div>

  <a href="{{ url_for('curso_contenido', curso_id=curso.id) }}" class="btn btn-outline-secondary mt-3">
    Volver al curso
  </a>
</div>
{% endblock %}
